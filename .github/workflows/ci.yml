name: ci

on:
  push:
    branches: dev
    paths-ignore:
      - '**.md'
      - '**/*.md.in'
      - 'docs/**'
      - '.github/workflows/publish.yml'
      - 'tools/ci/make-pkg.ps1'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - '**/*.md.in'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      cxxstd:
        description: 'Please input cxxstd, example: 23'
        default: '23'
        required: false

env:
  __1K_CXXSTD: '${{ inputs.cxxstd }}'

run-name: 'macos-lib@c++${{ inputs.cxxstd || 20 }}'

jobs:
  osx-arm64:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Build static lib for macOS ARM64
      shell: pwsh
      run: ./tools/cmdline/axmol -p osx -dll -O3
    - name: Upload macOS ARM64 static library
      uses: actions/upload-artifact@v4
      with:
        name: libaxmol-macos-arm64
        path: |
          build/lib/Release/libaxmol.a

  osx-x64:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Build static lib for macOS x64
      shell: pwsh
      run: ./tools/cmdline/axmol -p osx -dll -O3
    - name: Upload macOS x64 static library
      uses: actions/upload-artifact@v4
      with:
        name: libaxmol-macos-x64
        path: |
         build/lib/Release/libaxmol.a

